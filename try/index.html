<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRY — Aisology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--neon:#00d4ff;--neon2:#0080ff;--neon3:#00ffcc;--bg:#030d1a;--bg2:#071525;--card:rgba(0,180,255,0.04);--border:rgba(0,212,255,0.2);--text:#e8f4ff;--sub:rgba(232,244,255,0.55)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(1px 1px at 20% 30%,rgba(0,212,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 50% 60%,rgba(0,212,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 90% 70%,rgba(0,255,200,.5) 0%,transparent 100%),radial-gradient(1px 1px at 35% 90%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(2px 2px at 15% 55%,rgba(0,212,255,.4) 0%,transparent 100%)}
.nebula{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(0,80,180,.12) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(0,150,100,.08) 0%,transparent 70%)}
main{position:relative;z-index:1}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem 4rem;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:120px;background:linear-gradient(to bottom,transparent,var(--bg));z-index:2}
.hero-ring{position:absolute;border-radius:50%;border:1px solid var(--border)}
.hero-ring:nth-child(1){width:300px;height:300px;opacity:.3;animation:pulseRing 4s ease-in-out infinite 0s}
.hero-ring:nth-child(2){width:500px;height:500px;opacity:.2;animation:pulseRing 4s ease-in-out infinite .8s}
.hero-ring:nth-child(3){width:700px;height:700px;opacity:.1;animation:pulseRing 4s ease-in-out infinite 1.6s}
@keyframes pulseRing{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-label{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.4em;color:var(--neon);margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s ease forwards .2s}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(4rem,12vw,9rem);font-weight:900;line-height:.9;background:linear-gradient(135deg,var(--neon) 0%,#fff 40%,var(--neon2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(0,212,255,.4));opacity:0;animation:fadeUp .8s ease forwards .4s}
.hero-sub{font-family:'Orbitron',sans-serif;font-size:clamp(.7rem,2vw,1rem);letter-spacing:.6em;color:var(--neon);margin-top:1rem;opacity:0;animation:fadeUp .8s ease forwards .6s}
.hero-desc{max-width:480px;font-size:.95rem;line-height:1.8;color:var(--sub);margin-top:2.5rem;font-weight:300;opacity:0;animation:fadeUp .8s ease forwards .8s}
.hero-scroll{margin-top:4rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;animation:fadeUp .8s ease forwards 1.2s}
.hero-scroll span{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.3em;color:var(--neon);opacity:.6}
.scroll-line{width:1px;height:60px;background:linear-gradient(to bottom,var(--neon),transparent);animation:scrollAnim 2s ease-in-out infinite}
@keyframes scrollAnim{0%,100%{opacity:.3}50%{opacity:1}}
.section-wrap{padding:6rem 2rem;max-width:1100px;margin:0 auto}
.section-label{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.5em;color:var(--neon);opacity:.7;margin-bottom:.75rem}
.section-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:700;color:#fff;filter:drop-shadow(0 0 8px rgba(0,212,255,.3));margin-bottom:.75rem}
.divider{width:60px;height:2px;background:linear-gradient(90deg,var(--neon),transparent);margin-bottom:3rem}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
.app-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s ease;display:flex;flex-direction:column}
.app-card:hover{border-color:rgba(0,212,255,.5);transform:translateY(-3px);box-shadow:0 8px 40px rgba(0,212,255,.12)}
.app-art{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:linear-gradient(135deg,#071525,#0d2545)}
.app-art img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.app-card:hover .app-art img{transform:scale(1.04)}
.art-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.app-info{padding:1.25rem;flex:1;display:flex;flex-direction:column}
.app-num{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.3em;color:var(--neon);opacity:.5;margin-bottom:.5rem}
.app-name{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:700;color:#fff;margin-bottom:.6rem;line-height:1.3}
.app-desc{font-size:.82rem;line-height:1.7;color:var(--sub);font-weight:300;margin-bottom:1rem;flex:1}
.app-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.tag{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:var(--neon3);border:1px solid rgba(0,255,200,.3);padding:.2em .6em;border-radius:2px}
.app-actions{display:flex;align-items:center;justify-content:space-between;padding-top:.75rem;border-top:1px solid rgba(0,212,255,.08)}
.try-btn{display:inline-flex;align-items:center;gap:.4rem;font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.15em;color:var(--bg);background:var(--neon);text-decoration:none;padding:.55rem 1.1rem;border-radius:4px;transition:all .2s}
.try-btn:hover{background:#fff;box-shadow:0 0 15px rgba(0,212,255,.4)}
.delete-btn{background:none;border:none;color:rgba(255,80,80,.35);font-family:'Space Mono',monospace;font-size:.65rem;cursor:pointer;padding:.5rem;transition:color .2s}
.delete-btn:hover{color:rgba(255,80,80,.8)}
.add-wrap{background:var(--bg2);border-top:1px solid var(--border)}
.add-fields{display:flex;flex-direction:column;gap:.75rem;margin-top:2rem}
.field-row{display:flex;gap:.75rem;flex-wrap:wrap}
input[type="text"],input[type="password"]{flex:1;min-width:200px;background:rgba(0,212,255,.04);border:1px solid var(--border);border-radius:8px;padding:.8rem 1.1rem;color:var(--text);font-family:'Space Mono',monospace;font-size:.78rem;outline:none;transition:border-color .3s}
input[type="text"]:focus,input[type="password"]:focus{border-color:var(--neon);box-shadow:0 0 0 2px rgba(0,212,255,.1)}
input::placeholder{color:rgba(232,244,255,.28)}
.btn{font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.2em;padding:.85rem 2rem;border-radius:8px;cursor:pointer;transition:all .3s;border:none;text-transform:uppercase;white-space:nowrap}
.btn-primary{background:var(--neon);color:var(--bg);box-shadow:0 0 20px rgba(0,212,255,.3);align-self:flex-start}
.btn-primary:hover{background:#fff;box-shadow:0 0 30px rgba(0,212,255,.5);transform:translateY(-1px)}
.btn-sm{font-family:'Space Mono',monospace;font-size:.65rem;padding:.6rem 1.2rem;background:rgba(0,212,255,.08);color:var(--neon);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:.1em}
.btn-sm:hover{border-color:var(--neon)}
.form-hint{font-size:.75rem;color:var(--sub);margin-top:1rem;font-weight:300;line-height:1.7}
.form-hint code{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--neon);background:rgba(0,212,255,.08);padding:.1em .4em;border-radius:3px}
.token-section{background:rgba(0,212,255,.03);border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin-bottom:2rem}
.token-status{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.15em;margin-top:.75rem}
.token-status.ok{color:var(--neon3)}
.token-status.ng{color:rgba(255,100,100,.8)}
.nav-links{display:flex;justify-content:center;gap:.5rem;padding:2rem;border-top:1px solid var(--border);flex-wrap:wrap}
.nav-link{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.3em;color:var(--sub);text-decoration:none;padding:.6rem 1.2rem;border:1px solid rgba(255,255,255,.08);border-radius:4px;transition:all .3s;text-transform:uppercase}
.nav-link:hover{color:var(--neon);border-color:var(--border)}
.nav-link.active{color:var(--neon);border-color:var(--neon)}
.empty-state{text-align:center;padding:4rem 2rem;border:1px dashed var(--border);border-radius:12px;color:var(--sub);font-size:.85rem;line-height:1.8;display:none}
.empty-state.visible{display:block}
.loading{text-align:center;padding:3rem;color:var(--sub);font-family:'Space Mono',monospace;font-size:.75rem;letter-spacing:.2em}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--neon);color:var(--bg);font-family:'Space Mono',monospace;font-size:.75rem;padding:.8rem 1.5rem;border-radius:6px;box-shadow:0 0 30px rgba(0,212,255,.4);z-index:1000;transform:translateY(100px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:rgba(255,80,80,.9)}
</style>
</head>
<body>
<div class="stars"></div>
<div class="nebula"></div>
<main>
<section class="hero">
<div class="hero-ring"></div>
<div class="hero-ring"></div>
<div class="hero-ring"></div>
<p class="hero-label">Aisology — Apps</p>
<h1 class="hero-title">TRY</h1>
<p class="hero-sub">[ アプリを試す ]</p>
<p class="hero-desc">AIと共に作ったツールとゲームたち。<br>気になったものを、まず触ってみてください。</p>
<div class="hero-scroll"><span>scroll</span><div class="scroll-line"></div></div>
</section>
<div class="section-wrap">
<p class="section-label">All Apps</p>
<h2 class="section-title">Works</h2>
<div class="divider"></div>
<div id="loading" class="loading">Loading...</div>
<div class="apps-grid" id="apps-grid"></div>
<div class="empty-state" id="empty-state">アプリはまだありません。</div>
</div>
<div class="add-wrap">
<div class="section-wrap">
<p class="section-label">Manage</p>
<h2 class="section-title">アプリを追加する</h2>
<div class="divider"></div>
<div id="admin-login" style="background:rgba(0,212,255,.03);border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin-bottom:2rem;">
<p class="section-label" style="margin-bottom:.75rem">管理者ログイン</p>
<div style="display:flex;gap:.75rem;flex-wrap:wrap">
<input type="password" id="admin-pass" placeholder="管理者パスワード" style="flex:1;min-width:200px">
<button class="btn-sm" onclick="checkAdmin()">ログイン</button>
</div>
</div>
<div id="admin-panel" style="display:none">
<div class="token-section">
<p class="section-label" style="margin-bottom:.5rem">GitHub Token (初回のみ)</p>
<div style="display:flex;gap:.75rem;flex-wrap:wrap">
<input type="password" id="token-input" placeholder="GitHub Fine-grained Token" style="flex:1;min-width:260px">
<button class="btn-sm" onclick="saveToken()">保存</button>
<button class="btn-sm" onclick="clearToken()" style="color:rgba(255,100,100,.6)">クリア</button>
<button class="btn-sm" onclick="logoutAdmin()" style="color:rgba(255,100,100,.6)">ログアウト</button>
</div>
<p class="token-status" id="token-status"></p>
</div>
<div class="add-fields">
<div class="field-row">
<input type="text" id="name-input" placeholder="アプリ名" />
<input type="text" id="url-input" placeholder="URL: https://..." />
</div>
<input type="text" id="desc-input" placeholder="説明文" />
<div class="field-row">
<input type="text" id="tags-input" placeholder="タグ (例: Tool, AI, Game)" />
<input type="text" id="art-input" placeholder="サムネイル画像URL (任意)" />
</div>
<button class="btn btn-primary" onclick="addApp()">ADD APP</button>
</div>
<p class="form-hint">タグはカンマ区切り。サムネイルはOGP画像やスクリーンショットのURLを貼ってください。</p>
</div>
</div>
</div>
<nav class="nav-links">
<a href="../" class="nav-link">← Read / 記事</a>
<a href="../listen/" class="nav-link">Listen / 音楽</a>
<a href="#" class="nav-link active">Try / アプリ →</a>
<a href="https://lin.ee/" class="nav-link">LINE公式</a>
</nav>
</main>
<div class="toast" id="toast"></div>
<script>
const OWNER='goroyattemiyo';
const REPO='aisology';
const FILE='try/apps.json';
const API=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
const ADMIN_HASH='7be5f9cd73d4cc0846df7618e2fd82849b5bc11863cbfeb23201169b09d57512';

function getToken(){ return localStorage.getItem('aisology_gh_token')||''; }
function saveToken(){
  const t=document.getElementById('token-input').value.trim();
  if(!t){ showToast('トークンを入力してください','error'); return; }
  localStorage.setItem('aisology_gh_token',t);
  document.getElementById('token-input').value='';
  updateTokenStatus();
  showToast('トークンを保存しました ✓');
}
function clearToken(){ localStorage.removeItem('aisology_gh_token'); updateTokenStatus(); showToast('クリアしました'); }
function updateTokenStatus(){
  const el=document.getElementById('token-status');
  if(getToken()){ el.textContent='✓ トークン設定済み'; el.className='token-status ok'; }
  else{ el.textContent='✗ 未設定'; el.className='token-status ng'; }
}
async function checkAdmin(){
  const pass=document.getElementById('admin-pass').value;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pass));
  const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hash===ADMIN_HASH){ localStorage.setItem('aisology_admin',hash); showAdminSection(); showToast('ログインしました ✓'); }
  else{ showToast('パスワードが違います','error'); }
}
function showAdminSection(){ document.getElementById('admin-login').style.display='none'; document.getElementById('admin-panel').style.display='block'; }
function checkAdminSession(){ if(localStorage.getItem('aisology_admin')===ADMIN_HASH) showAdminSection(); }
function logoutAdmin(){ localStorage.removeItem('aisology_admin'); document.getElementById('admin-login').style.display='block'; document.getElementById('admin-panel').style.display='none'; showToast('ログアウトしました'); }

function appIcon(){ return `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="1"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`; }
function artHTML(src){ if(src) return `<img src="${src}" alt="app" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentElement.innerHTML='<div class=art-placeholder>${appIcon().replace(/"/g,"'")}</div>'">`; return `<div class="art-placeholder">${appIcon()}</div>`; }

async function loadApps(){
  try{
    const r=await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE}?t=${Date.now()}`);
    if(!r.ok) throw new Error();
    return await r.json();
  }catch(e){ return []; }
}

async function saveApps(apps){
  const token=getToken();
  if(!token) throw new Error('トークン未設定');
  const current=await fetch(API,{headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github.v3+json'}});
  const currentData=await current.json();
  const sha=currentData.sha;
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(apps,null,2))));
  const res=await fetch(API,{method:'PUT',headers:{'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'update: apps.json',content,sha})});
  if(!res.ok){ const e=await res.json(); throw new Error(e.message||'保存失敗'); }
}

function render(apps){
  document.getElementById('loading').style.display='none';
  const grid=document.getElementById('apps-grid');
  const empty=document.getElementById('empty-state');
  grid.innerHTML='';
  if(!apps.length){ empty.classList.add('visible'); return; }
  empty.classList.remove('visible');
  apps.forEach((a,i)=>{
    const tags=a.tags.map(g=>`<span class="tag">${g}</span>`).join('');
    const card=document.createElement('div');
    card.className='app-card';
    card.innerHTML=`<div class="app-art">${artHTML(a.art)}</div><div class="app-info"><p class="app-num">APP ${String(i+1).padStart(2,'0')}</p><h3 class="app-name">${a.name}</h3><p class="app-desc">${a.desc||''}</p>${tags?`<div class="app-tags">${tags}</div>`:''}<div class="app-actions"><a href="${a.url}" target="_blank" class="try-btn">▶ 試してみる</a><button class="delete-btn" onclick="deleteApp('${a.id}')">✕ 削除</button></div></div>`;
    grid.appendChild(card);
  });
}

async function addApp(){
  const name=document.getElementById('name-input').value.trim();
  const url=document.getElementById('url-input').value.trim();
  const desc=document.getElementById('desc-input').value.trim();
  const tagsVal=document.getElementById('tags-input').value.trim();
  const art=document.getElementById('art-input').value.trim();
  if(!name||!url){ showToast('アプリ名とURLは必須です','error'); return; }
  if(!getToken()){ showToast('先にトークンを設定してください','error'); return; }
  showToast('保存中...');
  try{
    const apps=await loadApps();
    apps.push({id:Date.now().toString(),name,desc,url,tags:tagsVal?tagsVal.split(',').map(t=>t.trim()).filter(Boolean):[],art:art||'',addedAt:new Date().toISOString()});
    await saveApps(apps);
    render(apps);
    ['name-input','url-input','desc-input','tags-input','art-input'].forEach(id=>document.getElementById(id).value='');
    showToast('追加しました ✓');
  }catch(e){ showToast(e.message||'エラー','error'); }
}

async function deleteApp(id){
  if(!getToken()){ showToast('トークンを設定してください','error'); return; }
  showToast('削除中...');
  try{
    const apps=(await loadApps()).filter(a=>a.id!==id);
    await saveApps(apps);
    render(apps);
    showToast('削除しました');
  }catch(e){ showToast(e.message||'エラー','error'); }
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show');
  if(msg!=='保存中...'&&msg!=='削除中...') setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('admin-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') checkAdmin(); });
checkAdminSession();
updateTokenStatus();
loadApps().then(render);
</script>
</body>
</html>
